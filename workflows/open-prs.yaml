# yaml-language-server: $schema=../.kiri/workflow.schema.json

name: open-prs
steps:
  - sh: |
      cd "$KIRI_REPO_ROOT"
      prs=$(gh pr list --state open)
      if [ -z "$prs" ]; then
        echo "No open pull requests."
      else
        echo "$prs"
      fi
summarize:
  use: claude-code-summarizer
